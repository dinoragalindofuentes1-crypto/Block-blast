<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Block Blast Game</title>\n    <style>\n        body {\n            display: flex;\n            flex-direction: column;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            margin: 0;\n            background-color: #f0f0f0;\n            font-family: Arial, sans-serif;\n        }\n        canvas {\n            border: 1px solid #000;\n            background: #fff;\n        }\n        #menu {\n            position: absolute;\n            top: 20px;\n            text-align: center;\n        }\n    </style>\n</head>\n<body>\n    <div id="menu">\n        <h1>Block Blast</h1>\n        <button id="start-btn">Start Game</button>\n        <h2 id="high-score">High Score: 0</h2>\n    </div>\n    <canvas id="gameCanvas" width="800" height="600"></canvas>\n    <script>\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n\n        let highScore = 0;\n        let score = 0;\n        const levels = Array.from({ length: 100 }, (_, i) => ({ level: i + 1, blocks: Math.floor(Math.random() * 100) + 20 }));\n\n        let currentLevel = 0;\n        let gameActive = false;\n\n        document.getElementById('start-btn').onclick = () => {\n            score = 0;\n            currentLevel = 0;\n            gameActive = true;\n            document.getElementById('menu').style.display = 'none';\n            requestAnimationFrame(gameLoop);\n        };\n\n        function gameLoop() {\n            if (!gameActive) return;\n            update();\n            draw();\n            requestAnimationFrame(gameLoop);\n        }\n\n        function update() {\n            if (score >= levels[currentLevel].blocks) {\n                currentLevel++;\n                if (currentLevel >= levels.length) {\n                    gameActive = false;\n                    alert('Congratulations! You completed the game!');\n                    if (score > highScore) {\n                        highScore = score;\n                        document.getElementById('high-score').innerText = 'High Score: ' + highScore;\n                    }\n                    document.getElementById('menu').style.display = 'block';\n                }\n            }\n            score++; // Increment score as an example\n        }\n\n        function draw() {\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            ctx.fillStyle = '#00F';\n            ctx.fillText('Level: ' + (currentLevel + 1), 10, 20);\n            ctx.fillText('Score: ' + score, 10, 40);\n            ctx.fillText('Blocks to clear: ' + (levels[currentLevel].blocks - score), 10, 60);\n            // Drawing logic for blocks would go here\n        }\n    </script>\n</body>\n</html>\n
